name: 🚀 Deploy Laravel to cPanel via FTP

on:
  push:
    branches:
      - main # Ganti jika branch deploy kamu berbeda

jobs:
  deploy:
    name: Upload Files via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repo
        uses: actions/checkout@v3

      - name: 🧰 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: 🛠 Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci --legacy-peer-deps

      - name: 🏷 Generate Version & Build
        run: |
          VERSION_TAG="v$(node -p "require('./package.json').version")-$(git rev-parse --short HEAD)"
          export VITE_APP_VERSION="$VERSION_TAG"
          echo "Building version: $VITE_APP_VERSION"
          # Inject version into Service Worker
          sed -i "s/__APP_VERSION__/$VERSION_TAG/" public/sw.js
          npm run build

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 193.203.172.8
          username: u440249744.dev
          password: PenakNgene123!
          server-dir: /
          local-dir: ./
          exclude: |
            **/.git*
            **/.github*
            node_modules/**
            vendor/**
            tests/**
            .env
            .env.*
            storage/debugbar
            storage/logs
            storage/framework/cache
